<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Trottinette 3D</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; }

#menu {
  position: absolute;
  width: 100%; height: 100%;
  background: #111; color: white;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

button { padding: 15px; margin: 10px; font-size: 20px; }

#hud {
  position: absolute;
  top: 10px; left: 10px;
  color: white;
}

#gamepad-mapper {
  position: fixed;
  inset: 0;
  z-index: 120;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(5, 8, 12, 0.78);
  color: #f8fbff;
}

.gamepad-card {
  width: min(920px, calc(100vw - 32px));
  max-height: calc(100vh - 32px);
  overflow: auto;
  background: #111820;
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 8px;
  box-shadow: 0 20px 70px rgba(0,0,0,0.45);
  padding: 18px;
}

.gamepad-head,
.gamepad-toolbar,
.gamepad-row,
.gamepad-live {
  display: flex;
  gap: 12px;
}

.gamepad-head,
.gamepad-row {
  align-items: center;
  justify-content: space-between;
}

.gamepad-head h2 {
  margin: 0;
  font-size: 22px;
}

.gamepad-close,
.gamepad-small {
  padding: 8px 12px;
  margin: 0;
  font-size: 14px;
}

.gamepad-toolbar {
  flex-wrap: wrap;
  margin: 12px 0;
}

.gamepad-status,
.gamepad-capture {
  margin: 10px 0;
  color: #b8c7d8;
  font: 14px/1.4 monospace;
}

.gamepad-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.gamepad-row {
  min-height: 42px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
}

.gamepad-row strong {
  display: block;
  font-size: 14px;
}

.gamepad-row span {
  display: block;
  color: #9fb1c3;
  font: 12px monospace;
}

.gamepad-live {
  margin-top: 14px;
  align-items: stretch;
}

.gamepad-live > div {
  flex: 1 1 0;
  min-width: 0;
  background: rgba(0,0,0,0.26);
  border-radius: 6px;
  padding: 10px;
}

.gamepad-readout {
  margin-top: 8px;
  color: #d7e6f5;
  font: 12px/1.55 monospace;
  white-space: pre-wrap;
}

@media (max-width: 760px) {
  .gamepad-list,
  .gamepad-live {
    grid-template-columns: 1fr;
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div id="menu">
  <h1>Jeu Trottinette</h1>
  <button onclick="start('scooter')">Jouer avec la trottinette</button>
  <button onclick="start('mech')">Jouer avec le personnage</button>
  <button onclick="start('car')">Jouer avec la voiture</button>
  <button onclick="start('titan')">Jouer avec le bot anime</button>
  <button onclick="start('pinstripe')">Jouer avec le Pinstripe Shadows</button>
  <button onclick="start('chasseur')">Jouer avec l'avion chasseur</button>
  <button onclick="start('wargun')">Jouer avec le Wargun</button>
  <button onclick="start('fly')">Survoler la ville</button>
  <button onclick="openGamepadMapper()">Regler la manette</button>
  <button onclick="location.href='puppet_animation_editor.html'">Marionnette animation</button>
</div>

<div id="hud" style="display:none; position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.55); color:white; font:14px monospace; padding:10px 16px; border-radius:8px; z-index:30; pointer-events:none; line-height:1.7;"></div>

<div id="gamepad-mapper" aria-hidden="true">
  <div class="gamepad-card">
    <div class="gamepad-head">
      <h2>Reglage manette</h2>
      <button id="gamepad-close" class="gamepad-close" type="button">Fermer</button>
    </div>
    <div id="gamepad-status" class="gamepad-status">Manette non detectee</div>
    <div class="gamepad-toolbar">
      <button id="gamepad-detect" class="gamepad-small" type="button">Detecter</button>
      <button id="gamepad-reset" class="gamepad-small" type="button">Reinitialiser</button>
    </div>
    <div id="gamepad-capture" class="gamepad-capture">Choisis une commande, puis bouge le stick ou appuie sur le bouton.</div>
    <div id="gamepad-list" class="gamepad-list"></div>
    <div class="gamepad-live">
      <div>
        <strong>Axes</strong>
        <div id="gamepad-axes" class="gamepad-readout"></div>
      </div>
      <div>
        <strong>Boutons</strong>
        <div id="gamepad-buttons" class="gamepad-readout"></div>
      </div>
    </div>
  </div>
</div>

<script src="libs/three.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "./libs/three.module.js",
    "three/addons/": "./libs/"
  }
}
</script>
<script type="module">
  import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { ThreeMFLoader } from 'three/addons/loaders/3MFLoader.js';
  import { STLLoader } from 'three/addons/loaders/STLLoader.js';
  import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
  window.FBXLoader = FBXLoader;
  window.GLTFLoader = GLTFLoader;
  window.ThreeMFLoader = ThreeMFLoader;
  window.STLLoader = STLLoader;
  window.OBJLoader = OBJLoader;
  window.dispatchEvent(new Event('fbxloaderready'));
  window.dispatchEvent(new Event('gltfloaderready'));
  window.dispatchEvent(new Event('threemfloaderready'));
  window.dispatchEvent(new Event('stlloaderready'));
  window.dispatchEvent(new Event('objloaderready'));
</script>
<script src="poilhes-game-map.js?v=poilhes-20260504"></script>
<script src="chasseur.js?v=chasseur-obj-texture-20260708c"></script>
<script src="wargun.js?v=wargun-obj-texture-20260708c"></script>
<script src="rzphzel.js?v=city-valley-portal-20260718"></script>
<script src="combat.js?v=cannon-trajectory-20260718"></script>
<script src="air-combat.js?v=air-combat-20260718"></script>
<script src="sector-streaming.js?v=sectors-20260718"></script>
<script src="ulvheim.js?v=ulvheim-20260618b"></script>

</body>
</html>
